# ============================================================
# tmux config — Amey
# Reload:  prefix + r
# Help:    prefix + ?
# Prefix:  C-b (default — kept for muscle memory if you SSH around)
# ============================================================

# --- general ---
set -g mouse on
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-ghostty:RGB"
set -ag terminal-overrides ",*256col*:RGB"
set -g history-limit 20000
# Was 50000. Lowered after 2026-05-27 crash: tmux's grid allocator under heavy
# output (gitfix builds + claude agents) hit a double-free in grid_free_line on
# macOS libmalloc. 20k still gives ample scrollback while keeping VM footprint
# well below the 1.1GB tmux hit at the crash.
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 10
set -g focus-events on

# --- splits with | and - (intuitive; defaults " and % still work) ---
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# --- vim-style pane navigation (prefix + h/j/k/l) ---
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# --- pane resize (prefix + H/J/K/L, repeatable) ---
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- new window inherits current dir ---
bind c new-window -c "#{pane_current_path}"

# --- vi copy mode (selection + yank to macOS clipboard) ---
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# --- reload binding ---
bind r source-file ~/.tmux.conf \; display "tmux config reloaded"

# ============================================================
# Plugins (managed by TPM)
# Install/update plugins:  prefix + I (capital i)
# Update plugins:          prefix + U
# Remove unused:           prefix + alt + u
# ============================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'catppuccin/tmux#latest'
set -g @plugin 'NHDaly/tmux-better-mouse-mode'

# --- smoother mouse scrolling inside tmux (3 lines per wheel tick) ---
# NOTE 2026-05-27: disabled aggressive scroll-emulation options below after a
# tmux crash. They patch tmux's copy-mode entry path, which is where the heap
# corruption fired. Plain scroll-speed override is kept (harmless).
set -g @scroll-speed-num-lines-per-scroll '3'
# set -g @scroll-without-changing-pane 'on'                    # disabled, was in crash stack
# set -g @scroll-in-moused-over-pane 'on'                      # disabled, ditto
# set -g @emulate-scroll-for-no-mouse-alternate-buffer 'on'   # disabled, ditto

# --- catppuccin theme settings ---
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_status_modules_right 'directory session'

# --- override base bg color: OLED pitch black #000000 ---
set -g @catppuccin_status_background '#000000'
set -g @catppuccin_window_background '#000000'

# --- continuum: auto-save sessions every 10 min, auto-restore on start ---
set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'

# --- TPM init (MUST stay last) ---
run '~/.tmux/plugins/tpm/tpm'
