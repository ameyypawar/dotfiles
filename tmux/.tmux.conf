# ============================================================
# tmux config
# Reload:  prefix + r
# Help:    prefix + ?
# Prefix:  C-b (default — kept for muscle memory if you SSH around)
# ============================================================

# --- general ---
set -g mouse on
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-ghostty:RGB"
set -ag terminal-overrides ",*256col*:RGB"

# 20k keeps tmux's per-pane grid allocation modest on macOS. Higher values can
# hit a libmalloc double-free in grid_free_line under sustained heavy output.
set -g history-limit 20000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 10
set -g focus-events on

# --- splits with | and - (intuitive; defaults " and % still work) ---
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# --- vim-style pane navigation (prefix + h/j/k/l) ---
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# --- pane resize (prefix + H/J/K/L, repeatable) ---
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- new window inherits current dir ---
bind c new-window -c "#{pane_current_path}"

# --- vi copy mode (selection + yank to macOS clipboard) ---
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# --- reload binding ---
bind r source-file ~/.tmux.conf \; display "tmux config reloaded"

# --- session pickers ---
# fzf popup over running sessions only (prefix + Ctrl+j)
bind C-j display-popup -E "\
  tmux list-sessions -F '#{?session_attached,,#{session_name}}' \
  | sed '/^$/d' \
  | fzf --reverse --header 'jump to session' --preview 'tmux capture-pane -pt {}' \
  | xargs tmux switch-client -t"

# sesh popup (prefix + T) — fuzzy across sessions, zoxide dirs, configs.
# Requires `brew install sesh` (in Brewfile).
bind T display-popup -E "sesh connect \$(sesh list | fzf-tmux -p 60%,60% --reverse --border-label ' sesh ')"

# Safer kill: swap to last session, then kill the previous one (no orphan attach)
bind X confirm-before -p "kill-session #S? (y/n)" \
  "run 'tmux switch-client -l; tmux kill-session -t #S'"

# ============================================================
# Plugins (managed by TPM)
# Install/update plugins:  prefix + I (capital i)
# Update plugins:          prefix + U
# Remove unused:           prefix + alt + u
# ============================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'catppuccin/tmux#latest'

# Plain tmux mouse mode (set -g mouse on, above) is sufficient. Avoid plugins
# that patch tmux's copy-mode entry path — they can destabilize the grid
# allocator under heavy output on macOS.

# --- catppuccin theme settings ---
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_status_modules_right 'directory session'

# --- override base bg color: OLED pitch black #000000 ---
set -g @catppuccin_status_background '#000000'
set -g @catppuccin_window_background '#000000'

# --- continuum: auto-save sessions every 10 min, auto-restore on start ---
set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'

# --- TPM init (MUST stay last) ---
run '~/.tmux/plugins/tpm/tpm'
